<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');
:root{--navy:#0a1628;--n2:#0f2040;--n3:#162d55;--card:#1a3560;--c2:#1e3d6a;--gold:#FFD700;--green:#00c853;--blue:#4fc3f7;--muted:#7a94ba;--text:#e8edf5}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);min-height:100vh}
.hero{background:linear-gradient(160deg,var(--n2),var(--n3));border-bottom:2px solid var(--gold);padding:32px 20px 24px;text-align:center}
.trophy{font-size:4rem;animation:glow 2.5s ease-in-out infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 10px rgba(255,215,0,.4))}50%{filter:drop-shadow(0 0 30px rgba(255,215,0,.9))}}
.ht{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:5px;color:var(--gold);margin-top:6px}
.hs{font-size:.72rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.upd{font-size:.68rem;color:var(--muted);margin-top:10px}
.sb{display:flex;gap:12px;padding:22px 16px 0;justify-content:center}
.sc{flex:1;max-width:180px;background:var(--card);border:2px solid var(--c2);border-radius:16px;padding:18px 14px;text-align:center}
.sc.lead{border-color:var(--gold)}
.sav{font-size:2.2rem}.snm{font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:5px}
.spt{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--gold);line-height:1;margin-top:3px}
.slb{font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.scp{margin-top:9px;font-size:.8rem;font-weight:600}
.leg{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px 0}
.li{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%}
.sec{padding:18px 14px 0}
.gc{background:var(--card);border:1px solid var(--c2);border-radius:12px;margin-bottom:10px;overflow:hidden}
.gh{background:var(--n3);padding:8px 14px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--gold)}
.mr{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);gap:6px;font-size:.8rem}
.mr:last-child{border-bottom:none}
.tl{flex:1;display:flex;align-items:center;gap:5px}
.tr{flex:1;display:flex;align-items:center;gap:5px;justify-content:flex-end}
.fl{font-size:1.15rem}.sc2{text-align:center;min-width:96px}
.rs{font-weight:800;font-size:.95rem;letter-spacing:1px}
.rs.pend{color:var(--muted);font-size:.7rem;line-height:1.3}
.pb{display:flex;gap:5px;justify-content:center;font-size:.67rem;margin-top:2px}
.pk{padding:2px 6px;border-radius:5px;font-weight:700}
.pe{background:rgba(0,200,83,.2);color:var(--green)}
.pr{background:rgba(79,195,247,.15);color:var(--blue)}
.pw{background:rgba(255,255,255,.05);color:var(--muted)}
.tz{font-size:.6rem;color:var(--muted);text-align:center;padding:10px 0 0}
.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spin{display:inline-block;width:30px;height:30px;border:3px solid #1e3d6a;border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:12px}
@keyframes sp{to{transform:rotate(360deg)}}
footer{text-align:center;padding:36px 20px 24px;font-size:.68rem;color:var(--muted)}
</style>
</head>
<body>

const GS=["A","B","C","D","E","F","G","H","I","J","K","L"];
function oc(h,a){return h>a?"H":h<a?"A":"D"}
function pcls(pk,res){
  if(!res||!pk||pk.h==null)return"pw";
  if(pk.h===res.h&&pk.a===res.a)return"pe";
  if(oc(pk.h,pk.a)===oc(res.h,res.a))return"pr";
  return"pw";
}
async function init(){
  let data;
  try{const r=await fetch("/api/data");data=await r.json();}
  catch{document.getElementById("app").innerHTML='<div class="loading">Erro ao carregar.</div>';return;}
  const{picks={},champion={},results={},scores={},updatedAt}=data;

  const rp=scores.renata||0,mp=scores.rafael||0;

      <div class="spt">${mp}</div><div class="slb">pontos</div>
      ${champion.rafael?`<div class="scp">🏆 ${champion.rafael}</div>`:""}

    <div class="li"><div class="dot" style="background:var(--blue)"></div> Resultado (+1)</div>
    <div class="li"><div class="dot" style="background:#2a4a7a"></div> Errou</div>
  </div>
  <div class="tz">🕐 Todos os horários em Amsterdam (CEST)</div>`;
  GS.forEach(g=>{
    html+=`<div class="sec"><div class="gc"><div class="gh">⚽ Grupo ${g}</div>`;
    JOGOS.filter(j=>j.g===g).forEach(m=>{
      const res=results[m.id];
      const rk=(picks.renata||{})[m.id];
      const mk=(picks.rafael||{})[m.id];
      html+=`<div class="mr">
        <div class="tl"><span class="fl">${m.hf}</span><span>${m.home}</span></div>
        <div class="sc2">
          <div class="rs ${res?"":"pend"}">${res?`${res.h} – ${res.a}`:m.dt}</div>
          <div class="pb">
            <span class="pk ${pcls(rk,res)}">${rk&&rk.h!=null?`Re:${rk.h}×${rk.a}`:"Re:—"}</span>
            <span class="pk ${pcls(mk,res)}">${mk&&mk.h!=null?`Raf:${mk.h}×${mk.a}`:"Raf:—"}</span>
          </div>
        </div>
        <div class="tr"><span>${m.away}</span><span class="fl">${m.af}</span></div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<footer>Bolão Copa 2026 · Renata × Rafael · Atualizado diariamente às 09h (Amsterdam)</footer>`;
  document.getElementById("app").innerHTML=html;
}
